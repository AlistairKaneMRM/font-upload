# Per-repo manifest for the rollout fan-out. Each entry tells the coordinator
# where to clone, where the binaries go, which files the agent is allowed to
# touch, and which past PR to mimic.
targets:
  - repo: MRMBRAND/toolkit-content-upload
    default_branch: develop
    fonts_dir: public/fonts
    editable_files:
      - src/fonts.js
      - src/fonts.css
    prompt: prompts/toolkit-content-upload.md
    reference_pr: https://github.com/MRMBRAND/toolkit-content-upload/pull/19

  - repo: MRMBRAND/toolkit-content-management
    default_branch: main
    fonts_dir: public/fonts
    editable_files:
      - src/data/fonts.ts
      - src/data/fonts.css
    prompt: prompts/toolkit-content-management.md
    reference_pr: https://github.com/MRMBRAND/toolkit-content-management/pull/128
